name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# zio-bdd-tooling uses APIs added after zio-bdd v1.0.0 (DefaultTypedExtractor,
# Tag[A] on TypedExtractor, structural matcher). Until a new tagged release is
# published to Maven Central, CI checks out zio-bdd main, publishLocal, and
# passes the computed SNAPSHOT version to all sbt invocations.
# Once EtaCassiopeia/zio-bdd tags v1.0.1+, replace the "Setup zio-bdd" steps
# with updating `zioBddVersion` in build.sbt and removing `ZIO_BDD_VERSION`.

jobs:
  # ── Scala: format check + unit tests ────────────────────────────────────────
  test:
    name: Test (Scala)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Check out the zio-bdd core so we can publishLocal the SNAPSHOT version
      - name: Checkout zio-bdd
        uses: actions/checkout@v4
        with:
          repository: EtaCassiopeia/zio-bdd
          fetch-depth: 0        # sbt-dynver needs full git history for version
          path: .zio-bdd-src

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/build.properties', 'project/*.sbt', '.zio-bdd-src/build.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Publish zio-bdd locally and capture version
        run: |
          cd .zio-bdd-src
          RAW=$(git describe --tags --long --match 'v*')
          WITHOUT_V="${RAW#v}"
          COUNT=$(echo "$WITHOUT_V" | cut -d'-' -f2)
          HASH=$(echo "$WITHOUT_V"  | cut -d'-' -f3 | sed 's/^g//')
          BASE=$(echo "$WITHOUT_V"  | cut -d'-' -f1)
          if [ "$COUNT" = "0" ]; then
            VERSION="$BASE"
          else
            VERSION="${BASE}+${COUNT}-${HASH}-SNAPSHOT"
          fi
          echo "ZIO_BDD_VERSION=$VERSION" >> "$GITHUB_ENV"
          sbt publishLocal

      - name: Check formatting
        run: sbt -DzioBdd.version="${ZIO_BDD_VERSION}" scalafmtCheckAll

      - name: Run tests
        run: sbt -DzioBdd.version="${ZIO_BDD_VERSION}" test

  # ── IntelliJ plugin: LSP jar + Gradle buildPlugin ───────────────────────────
  intellij-plugin:
    name: IntelliJ Plugin (Gradle)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout zio-bdd
        uses: actions/checkout@v4
        with:
          repository: EtaCassiopeia/zio-bdd
          fetch-depth: 0
          path: .zio-bdd-src

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/build.properties', 'project/*.sbt', '.zio-bdd-src/build.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('extensions/intellij/**/*.gradle.kts', 'extensions/intellij/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Publish zio-bdd locally and capture version
        run: |
          cd .zio-bdd-src
          RAW=$(git describe --tags --long --match 'v*')
          WITHOUT_V="${RAW#v}"
          COUNT=$(echo "$WITHOUT_V" | cut -d'-' -f2)
          HASH=$(echo "$WITHOUT_V"  | cut -d'-' -f3 | sed 's/^g//')
          BASE=$(echo "$WITHOUT_V"  | cut -d'-' -f1)
          if [ "$COUNT" = "0" ]; then
            VERSION="$BASE"
          else
            VERSION="${BASE}+${COUNT}-${HASH}-SNAPSHOT"
          fi
          echo "ZIO_BDD_VERSION=$VERSION" >> "$GITHUB_ENV"
          sbt publishLocal

      - name: Build LSP fat jar
        run: sbt -DzioBdd.version="${ZIO_BDD_VERSION}" lsp/assembly

      - name: Build IntelliJ plugin
        run: cd extensions/intellij && ./gradlew buildPlugin --no-daemon

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: zio-bdd-intellij-plugin
          path: extensions/intellij/build/distributions/*.zip
          retention-days: 7
