name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Scala: format check + unit tests ────────────────────────────────────────
  test:
    name: Test (Scala)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/build.properties', 'project/*.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run tests
        run: sbt test

  # ── IntelliJ plugin: LSP jar + Gradle buildPlugin ───────────────────────────
  intellij-plugin:
    name: IntelliJ Plugin (Gradle)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/build.properties', 'project/*.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('extensions/intellij/**/*.gradle.kts', 'extensions/intellij/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build LSP fat jar
        run: |
          mkdir -p extensions/intellij/src/main/resources/bin
          sbt lsp/assembly

      - name: Build and verify IntelliJ plugin
        run: cd extensions/intellij && ./gradlew buildPlugin verifyPluginStructure --no-daemon

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: zio-bdd-intellij-plugin
          path: extensions/intellij/build/distributions/*.zip
          retention-days: 7

  # ── VS Code extension: type-check + smoke package ───────────────────────────
  vscode-extension:
    name: VS Code extension (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and bundle
        run: npm run compile

      - name: Validate Rift imposter JSON schema
        run: npm run test:schema

      - name: Package extension (smoke test)
        run: npx @vscode/vsce package --out zio-bdd-ci-smoke.vsix --skip-license

      - name: Upload smoke VSIX
        uses: actions/upload-artifact@v4
        with:
          name: zio-bdd-vscode-ci-smoke
          path: extensions/vscode/zio-bdd-ci-smoke.vsix
          retention-days: 7
